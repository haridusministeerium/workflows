# this workflow doesn't use the automatically generated GITHUB_TOKEN, but a GH App
# token (similar to PATs).
#
# to refernece output from previous jobs' output:   ${{needs.job1.outputs.output1}}
name: Build & deploy docker image

on:
  workflow_call:
    inputs:
      registry:
        type: string
        default: 'docker.io'  # ghcr.io,
      image:
        #required: true
        default: ${{ github.REPOSITORY }}
        type: string
      runs-on:
        type: string
        default: 'ubuntu-latest'
      build-args:
        type: string
        default: '[]'
      target:
        type: string
        default: ''

jobs:
  docker:
    runs-on: ${{ inputs.runs-on }}
    # decrease our perms:
    permissions:
      contents: read
    steps:
    # TODO: fully qualified url is not supported by github Actions,
    #       and non-fully-qualified is not supported by gitea/forgejo
    #- uses: https://github.com/actions/create-github-app-token@v2
    #  if: ${{ inputs.registry == 'ghcr.io' }}
    #  id: app-token
    #  with:
    #    app-id: ${{ vars.APP_ID }}
    #    private-key: ${{ secrets.APP_KEY }}

    #- name: Login to GitHub Container Registry
    #  if: ${{ inputs.registry == 'ghcr.io' }}
    #  uses: docker/login-action@v4
    #  with:
    #    registry: ghcr.io
    #    username: ${{ github.actor }}
    #    #username: ${{ github.repository_owner }}
    #    password: ${{ steps.app-token.outputs.token }}
    #    #password: ${{ secrets.GITHUB_TOKEN }}

    # note per https://github.com/docker/build-push-action#git-context actions/checkout is not needed
    #- uses: actions/checkout@v5
    #  if: ${{ inputs.registry == 'ghcr.io' }}
    #  with:
    #    token: ${{ steps.app-token.outputs.token }}
    #    ref: ${{ github.head_ref }}
    #    # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config:
    #    persist-credentials: false

    - name: Login to Docker Hub
      id: login-dockerhub
      if: ${{ inputs.registry == 'docker.io' }}
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to private Container Registry
      if: ${{ steps.login-dockerhub.conclusion == 'skipped' }}
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.REPOSITORY_OWNER }}
        password: ${{ secrets.FORGEJO_PKG_API_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      # note following [with] block needed w/ self-hosted runners per https://github.com/myoung34/docker-github-actions-runner/issues/280
      with:
        driver-opts: |
          network=host
      #  install: true
      #  config: .github/buildkit.toml

    # https://github.com/docker/metadata-action
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ inputs.registry }}/${{ inputs.image }}
        tags: |
          type=ref,event=tag,enable=true,priority=600,prefix=,suffix=
          type=raw,value=latest,enable={{is_default_branch}}
        #type=ref,event=branch
        #type=ref,event=pr
        #type=semver,pattern={{version}}
        #type=semver,pattern={{major}}.{{minor}}
  
    # note if pushing to a local unauthenticated registry, then no login step is
    # needed; see https://docs.docker.com/build/ci/github-actions/local-registry/
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        #push: ${{ github.event_name != 'pull_request' }}
        push: true
        #tags: |
        #  ${{ inputs.registry }}/${{ inputs.image }}:latest
        tags: ${{ steps.meta.outputs.tags }}
        annotations: ${{ steps.meta.outputs.annotations }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: "${{ inputs.build-args }}"
        target: ${{ inputs.target }}

